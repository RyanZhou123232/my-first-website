<!DOCTYPE html>
<html>
<head>
    <title>Ryan's Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: white;
        }

        .container {
            text-align: center;
            padding: 100px 20px;
        }

        h1 {
            font-size: 60px;
            color: #38bdf8;
        }

        .subtitle {
            font-size: 20px;
            color: #cbd5f5;
            margin-top: 10px;
        }

        .button {
            margin-top: 30px;
            padding: 12px 24px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background-color: #38bdf8;
            color: #0f172a;
            cursor: pointer;
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 80px;
        }

        .card {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 15px;
            width: 200px;
        }

        .card h3 {
            color: #38bdf8;
        }

    </style>
</head>

<body>

    <div class="container">
        <h1>Hello Ryan</h1>
        <p class="subtitle">这是我的第一个真正的网站</p>

        <button class="button">Get Started</button>

        <div class="cards">
            <div class="card">
                <h3>Fast</h3>
                <p>速度很快</p>
            </div>

            <div class="card">
                <h3>Simple</h3>
                <p>简单易用</p>
            </div>

            <div class="card">
                <h3>Powerful</h3>
                <p>功能强大</p>
            </div>
        </div>
    </div>

</body>
</html>
